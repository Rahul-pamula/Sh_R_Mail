<div class="mb-10">
  <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6">
    <div>
      <h1 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-indigo-500 mb-2 mt-4 tracking-tight shadow-sm">
        ShrMail Phase Tracker
      </h1>
      <p class="text-gray-400">Development Progress Dashboard</p>
    </div>

    <!-- Overall Progress Metric -->
    <div class="mt-4 md:mt-0 flex items-center bg-gray-800 p-4 rounded-xl border border-gray-700 shadow-lg">
      <div class="mr-6">
        <p class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-1">Overall Progress</p>
        <div class="w-full bg-gray-700 rounded-full h-3 min-w-[150px]">
          <div class="bg-indigo-500 h-3 rounded-full transition-all duration-500 shadow-[0_0_10px_rgba(99,102,241,0.5)]" [style.width.%]="overallProgressInfo.percentage"></div>
        </div>
      </div>
      <div>
        <p class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 to-purple-400">
          {{ overallProgressInfo.text }}
        </p>
        <p class="text-xs text-center text-gray-500 mt-1">{{ completedTasks }} / {{ totalTasks }} tasks</p>
      </div>
    </div>
  </div>

  <!-- Create New Phase -->
  <div class="bg-gray-800 p-5 rounded-xl border border-gray-700 shadow-md mb-8 flex flex-col sm:flex-row items-center gap-4 transition-all hover:border-gray-600 focus-within:border-indigo-500 focus-within:ring-1 focus-within:ring-indigo-500">
    <div class="bg-gray-700 p-2 rounded-lg text-indigo-400">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>
    </div>
    <input 
      type="text" 
      [(ngModel)]="newPhaseTitle" 
      (keyup.enter)="createPhase()"
      placeholder="What is the next phase?" 
      class="flex-grow bg-transparent border-none text-lg text-white placeholder-gray-500 focus:outline-none focus:ring-0"
    >
    <button 
      (click)="createPhase()"
      class="bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2.5 px-6 rounded-lg transition-colors shadow-lg shadow-indigo-500/30 flex items-center"
      >
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mr-2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
      Add Phase
    </button>
  </div>
  <p *ngIf="phaseError" class="text-sm text-red-400 mb-4">{{ phaseError }}</p>
  
  <div class="grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 gap-6">
    <app-phase-card 
      *ngFor="let phase of phases" 
      [phase]="phase" 
      (deleted)="onPhaseDeleted($event)"
    ></app-phase-card>
    
    <!-- Empty State -->
    <div *ngIf="phases.length === 0" class="col-span-full py-20 flex flex-col items-center justify-center text-gray-500 bg-gray-800/50 rounded-2xl border border-dashed border-gray-700">
      <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" class="mb-4 text-gray-600"><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline></svg>
      <p class="text-xl font-medium">No phases created yet</p>
      <p class="text-sm mt-2">Create your first development phase above</p>
    </div>
  </div>
</div>
